name: Build and Publish Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build (base|browser|data|media|all)'
        default: 'all'

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }}

jobs:
  base:
    name: Build base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${REGISTRY}/${ORG}/base:${VERSION}" >> $GITHUB_OUTPUT
          echo "latest=${REGISTRY}/${ORG}/base:latest" >> $GITHUB_OUTPUT

      - name: Build and push base
        uses: docker/build-push-action@v5
        with:
          context: images/base
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  specialized:
    name: Build ${{ matrix.name }}
    needs: base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        name: [browser, data, media]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${REGISTRY}/${ORG}/${{ matrix.name }}:${VERSION}" >> $GITHUB_OUTPUT
          echo "latest=${REGISTRY}/${ORG}/${{ matrix.name }}:latest" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: images/${{ matrix.name }}
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cli:
    name: Build CLI binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o dist/toolbox-linux-amd64 .

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o dist/toolbox-linux-arm64 .

      - name: Build macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o dist/toolbox-darwin-amd64 .

      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o dist/toolbox-darwin-arm64 .

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o dist/toolbox-windows-amd64.exe .

      - name: Upload binaries
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
